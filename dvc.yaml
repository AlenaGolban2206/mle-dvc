# dvc.yaml
stages:
  get_data:
    cmd: python3 data.py
    deps:
      - data.py
    params:
      - index_col
    outs:
      - data/initial_data.csv
  fit_model:
    cmd: python3 fit.py
    deps:
      - data/initial_data.csv
      - fit.py
    params:
      - index_col
      - target_col
      - one_hot_drop
      - C
      - penalty
    outs:
      - models/fitted_model.pkl
  evaluate_model:
    cmd: python3 evaluate.py
    deps:
      - models/fitted_model.pkl
      - evaluate.py
    params:
      - index_col
      - target_col
      - n_splits
      - n_jobs
      - metrics
    outs:
      - cv_results/cv_res.json 

